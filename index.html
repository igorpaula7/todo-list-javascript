<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="./style.css" type="text/css">
</head>

<body>
  <main>
    <h1>Lista de Tarefas</h1>
    <form action="" id="form-tarefa">
      <label for="texto-tarefa">Digite a tarefa a ser adicionada:</label>
      <input type="text" name="tarefa" id="texto-tarefa">
      <button type="submit" id="botao-tarefa">Adicionar tarefa</button>
    </form>

    <h2>Tarefas:</h2>
    <ul id="tarefas">
    </ul>
  </main>
  <script src="./script.js"></script>
</body>

</html>
